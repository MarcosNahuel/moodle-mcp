name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:
    inputs:
      run_integration:
        description: 'Run integration tests against Moodle docker'
        required: false
        default: 'false'
        type: boolean

jobs:
  lint-test:
    name: Lint, typecheck, unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run typecheck
      - run: npm run test:coverage
      - run: npm run build
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage
          path: coverage/
          retention-days: 7

  integration:
    name: Integration tests against Moodle docker
    runs-on: ubuntu-latest
    # Opt-in only: trigger manually from Actions tab with "Run integration
    # tests" checked. Requires MOODLE_TEST_TOKEN secret plus a pre-seeded
    # course in the docker Moodle (see tests/integration/sandbox-setup.ts).
    # Running on free runners is flaky — MySQL 8 often OOMs during first-boot
    # initdb. Use a self-hosted / larger runner for reliability.
    if: github.event_name == 'workflow_dispatch' && inputs.run_integration == true
    needs: lint-test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Start Moodle sandbox
        run: docker compose -f tests/integration/docker-compose.test.yml up -d
      - name: Wait for Moodle install
        run: |
          for i in $(seq 1 40); do
            if curl -fSs http://localhost:8081/login/index.php > /dev/null; then
              echo "Moodle is up"
              exit 0
            fi
            echo "Waiting for Moodle... ($i/40)"
            sleep 15
          done
          echo "Moodle did not come up in time"
          exit 1
      - name: Run integration tests
        env:
          MOODLE_TEST_URL: http://localhost:8081
          # A real token must be provisioned; until then the suite
          # skips gracefully when MOODLE_TEST_TOKEN is absent.
          MOODLE_TEST_TOKEN: ${{ secrets.MOODLE_TEST_TOKEN }}
        run: npm run test:integration
      - name: Tear down sandbox
        if: always()
        run: docker compose -f tests/integration/docker-compose.test.yml down -v

  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    needs: lint-test
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'
      - run: npm ci
      - run: npm run build
      - run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
